name: Build Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") {
            "${{ github.ref_name }}".TrimStart("v")
          } else {
            (Get-Content VERSION -Raw).Trim()
          }
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: pwsh
        run: |
          .\build_installer.ps1 `
            -Version "${{ steps.version.outputs.value }}" `
            -Publisher "${{ github.repository_owner }}" `
            -AppUrl "${{ github.server_url }}/${{ github.repository }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: LumaUltraHandViewer-Installer
          path: installer-output/*.exe

      - name: Attach installer to GitHub release
        if: github.ref_type == 'tag'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" --generate-notes --title "Luma Ultra Hand Viewer ${{ github.ref_name }}" 2>$null
          gh release upload "${{ github.ref_name }}" installer-output\*.exe --clobber
